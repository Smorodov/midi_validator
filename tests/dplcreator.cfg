# DPLCreator Configuration File
# Lines starting with # are comments

# Output file name
output=project.dpl

# Scan subdirectories recursively
recursive=true

# Include hidden files (starting with .)
include_hidden=false

# Text file extensions (will be included with full content)
include_ext=.txt,.cpp,.h,.hpp,.c,.cc,.cxx,.py,.js,.html,.css,.md,.json,.xml,.yml,.yaml,.ini,.cfg,.conf,.bat,.cmd,.sh,.ps1,.dpl

# Binary file extensions (will be mentioned only)
binary_ext=.exe,.dll,.so,.dylib,.obj,.o,.lib,.a,.bin,.dat,.jpg,.jpeg,.png,.gif,.bmp,.ico,.pdf,.zip,.rar,.7z,.tar,.gz,.mp3,.mp4

# Extensions to exclude completely
exclude_ext=.log,.tmp,.bak,.swp,.swo

# Directories to ignore
ignore_dir=.git
ignore_dir=.svn
ignore_dir=.vs
ignore_dir=.vscode
ignore_dir=node_modules
ignore_dir=build
ignore_dir=Debug
ignore_dir=Release
ignore_dir=x64
ignore_dir=x86
ignore_dir=build
ignore_dir=bin
ignore_dir=obj
ignore_dir=packages

# Files to ignore
ignore_file=thumbs.db
ignore_file=.ds_store
ignore_file=desktop.ini